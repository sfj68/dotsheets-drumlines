<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Sheets & Drumlines — Character Sheets</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parchment: #f5ead8;
    --parchment-dark: #e8d5b5;
    --parchment-darker: #d4bc92;
    --accent: #8b2a0a;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --border: #a08050;
    --border-light: #c8a870;
    --shadow: rgba(26,18,8,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── SCREEN STYLES ─────────────────────────────────────────── */
  body {
    background-color: #2a1f0e;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(139,42,10,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(184,134,11,0.1) 0%, transparent 60%);
    font-family: 'Crimson Pro', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .screen-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .screen-header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: var(--gold-light);
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    letter-spacing: 0.05em;
  }
  .screen-header p {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--parchment-darker);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.8;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .btn {
    font-family: 'Cinzel', serif;
    font-size: 0.73rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--parchment-dark);
    color: var(--ink);
  }
  .btn:hover { background: var(--parchment-darker); transform: translateY(-1px); }
  .btn-accent { background: var(--accent); color: var(--parchment); border-color: var(--accent); }
  .btn-accent:hover { background: #a83412; }

  .no-chars {
    text-align: center;
    color: var(--parchment-darker);
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    padding: 60px 20px;
    opacity: 0.7;
  }

  /* Sheet preview wrapper on screen */
  .sheets-container {
    display: flex;
    flex-direction: column;
    gap: 32px;
    align-items: center;
  }

  /* ── SHEET ITSELF ──────────────────────────────────────────── */
  .sheet {
    background: var(--parchment);
    border: 2px solid var(--border);
    border-radius: 6px;
    width: 100%;
    max-width: 780px;
    padding: 32px 36px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    position: relative;
    page-break-after: always;
  }

  /* Decorative corner marks */
  .sheet::before, .sheet::after {
    content: '';
    position: absolute;
    width: 32px; height: 32px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .sheet::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .sheet::after  { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  /* Sheet header */
  .sheet-header {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    position: relative;
  }
  .sheet-header::after {
    content: '✦';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--parchment);
    padding: 0 8px;
    color: var(--gold);
    font-size: 0.9rem;
  }
  .game-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.8;
  }
  .char-name-display {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }
  .char-meta {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--accent);
    margin-top: 2px;
  }

  /* Section label */
  .sec-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  /* ── TOP ROW: stats + HP/AP ──────────────────────────────── */
  .top-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    margin-top: 24px;
    margin-bottom: 20px;
    align-items: start;
  }

  /* Primary stats */
  .stats-block {
    display: flex;
    gap: 10px;
  }
  .stat-cell {
    width: 68px;
    text-align: center;
    background: var(--parchment-dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 4px 6px;
  }
  .stat-cell .stat-name {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .stat-cell .stat-value {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.9rem;
    line-height: 1;
    color: var(--ink);
    font-weight: 700;
  }
  .stat-cell .stat-sub {
    font-family: 'Crimson Pro', serif;
    font-size: 0.7rem;
    color: #888;
    margin-top: 2px;
    font-style: italic;
  }

  /* Middle derived stats */
  .derived-block {
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
  }
  .derived-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .derived-label {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--parchment);
    background: var(--accent);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    padding: 6px 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    min-width: 20px;
  }
  .derived-label.gold-bg { background: var(--gold); }
  .derived-boxes {
    display: flex;
    flex: 1;
    background: var(--parchment-dark);
  }
  .derived-box {
    flex: 1;
    aspect-ratio: 1;
    border-right: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--ink);
    min-width: 28px;
    min-height: 28px;
  }
  .derived-box:last-child { border-right: none; }
  .derived-box.filled { background: rgba(139,42,10,0.12); }
  .derived-box.gold-filled { background: rgba(184,134,11,0.18); }

  /* Equipment block */
  .equip-block {
    min-width: 140px;
  }
  .equip-type-badge {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--accent);
    color: var(--parchment);
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .equip-name-line {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 4px;
    min-height: 1.4em;
  }
  .write-line {
    border-bottom: 1px solid var(--border);
    min-height: 1.6em;
    margin-bottom: 6px;
  }

  /* ── MARKS ROW ──────────────────────────────────────────── */
  .marks-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    padding: 10px 14px;
    background: var(--parchment-dark);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .marks-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    flex-shrink: 0;
  }
  .mark-circles {
    display: flex;
    gap: 8px;
    flex: 1;
  }
  .mark-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    flex-shrink: 0;
  }
  .mark-circle.filled { background: var(--accent); }
  .marks-note {
    font-family: 'Crimson Pro', serif;
    font-size: 0.8rem;
    font-style: italic;
    color: #777;
    flex: 1;
    text-align: right;
  }

  /* ── ABILITIES ──────────────────────────────────────────── */
  .abilities-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }
  .ability-box {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .ability-header {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment);
    background: var(--gold);
    padding: 4px 10px;
  }
  .ability-content {
    padding: 6px 10px;
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--ink);
    background: var(--parchment-dark);
    min-height: 42px;
    line-height: 1.5;
  }
  .ability-content.empty {
    background: var(--parchment-dark);
    padding: 6px 10px;
  }

  /* ── LOWER SECTIONS ─────────────────────────────────────── */
  .lower-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .lined-box {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .lined-box-header {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment);
    background: var(--accent);
    padding: 4px 10px;
  }
  .lined-box-header.gold-bg { background: var(--gold); color: var(--ink); }
  .lined-box-body {
    background: var(--parchment-dark);
    padding: 6px 10px;
  }
  .ruled-line {
    border-bottom: 1px solid var(--border-light);
    height: 26px;
    display: block;
  }

  /* ── NOTES (full width) ─────────────────────────────────── */
  .notes-section {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .notes-section-header {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--parchment);
    background: var(--accent);
    padding: 4px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .notes-body {
    background: var(--parchment-dark);
    padding: 6px 10px;
  }

  /* ── REFERENCE FOOTER ───────────────────────────────────── */
  .ref-footer {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 4px;
  }
  .ref-col-title {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
    border-bottom: 1px solid var(--parchment-darker);
    padding-bottom: 2px;
  }
  .ref-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Crimson Pro', serif;
    font-size: 0.72rem;
    line-height: 1.7;
    color: var(--ink);
  }
  .ref-row span:first-child { font-weight: 600; color: var(--accent); }

  /* ── PRINT STYLES ──────────────────────────────────────── */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body { background: white !important; padding: 0; margin: 0; }

    .screen-header, .toolbar { display: none !important; }

    .sheets-container { gap: 0; }

    .sheet {
      box-shadow: none;
      border: 1px solid #888;
      border-radius: 0;
      max-width: 100%;
      width: 100%;
      padding: 8mm 10mm;
      margin: 0;
      page-break-after: always;
      page-break-inside: avoid;
    }
    .sheet:last-child { page-break-after: auto; }

    /* Header */
    .sheet-header { margin-bottom: 6px; padding-bottom: 6px; }
    .char-name-display { font-size: 1.4rem; }
    .char-meta { font-size: 0.8rem; margin-top: 0; }
    .game-title { font-size: 0.55rem; margin-bottom: 2px; }

    /* Top row */
    .top-row { gap: 10px; margin-top: 8px; margin-bottom: 8px; }
    .stat-cell { width: 54px; padding: 4px 2px; }
    .stat-cell .stat-value { font-size: 1.4rem; }
    .stat-cell .stat-name { font-size: 0.48rem; }
    .stat-cell .stat-sub { font-size: 0.58rem; margin-top: 1px; }
    .stats-block { gap: 6px; }
    .derived-block { gap: 6px; }
    .derived-box { min-width: 20px; min-height: 20px; font-size: 0.85rem; }
    .equip-block { min-width: 110px; }

    /* Marks */
    .marks-row { padding: 5px 8px; margin-bottom: 8px; }
    .mark-circle { width: 20px; height: 20px; }
    .marks-note { font-size: 0.68rem; }
    .marks-label { font-size: 0.52rem; }

    /* Abilities */
    .abilities-row { gap: 8px; margin-bottom: 8px; }
    .ability-content { min-height: 28px; padding: 4px 8px; font-size: 0.82rem; }
    .ability-header { padding: 2px 8px; font-size: 0.5rem; }

    /* Lower grid */
    .lower-grid { gap: 8px; margin-bottom: 8px; }
    .lined-box-header { padding: 2px 8px; font-size: 0.5rem; }
    .lined-box-body { padding: 3px 8px; }
    .ruled-line { height: 20px; }

    /* Notes */
    .notes-section { margin-bottom: 8px; }
    .notes-section-header { padding: 2px 8px; font-size: 0.5rem; }
    .notes-body { padding: 3px 8px; }

    /* Reference footer */
    .ref-footer { padding-top: 6px; gap: 6px; }
    .ref-col-title { font-size: 0.48rem; margin-bottom: 2px; }
    .ref-row { font-size: 0.62rem; line-height: 1.5; }

    /* Section labels */
    .sec-label { font-size: 0.5rem; margin-bottom: 3px; }

    /* Corner marks */
    .sheet::before, .sheet::after { width: 20px; height: 20px; }
  }

  @page {
    size: letter portrait;
    margin: 6mm;
  }
</style>
</head>
<body>

<div class="screen-header">
  <h1>Dot Sheets &amp; Drumlines</h1>
  <p>Character Sheets — Print or Save as PDF</p>
</div>

<div class="toolbar">
  <button class="btn btn-accent" onclick="window.print()">🖨 Print / Save as PDF</button>
  <button class="btn" onclick="loadFromTracker()">↺ Reload from Tracker</button>
  <button class="btn" onclick="printBlankSheet()">📄 Print Blank Sheet</button>
</div>

<div id="sheets-container" class="sheets-container">
  <div class="no-chars" id="no-chars">No player characters found.<br><br>
    <span style="font-size:0.8rem;opacity:0.7;">Open the Campaign Tracker in the same browser, add your characters, then return here.</span>
  </div>
</div>

<script>
function loadFromTracker() {
  const raw = localStorage.getItem('dsd-chars');
  const chars = raw ? JSON.parse(raw) : [];
  const pcs = chars.filter(c => !c.isNpc);
  const container = document.getElementById('sheets-container');
  const noChars = document.getElementById('no-chars');

  if (!pcs.length) {
    container.innerHTML = '';
    container.appendChild(noChars);
    noChars.style.display = 'block';
    return;
  }

  noChars.style.display = 'none';
  container.innerHTML = pcs.map(ch => buildSheet(ch)).join('');
}

function buildSheet(ch) {
  const cstat = ['Brawn','Brain','Brisk'].includes(ch.equip) ? ch.equip : ch.equip==='Magic'?'Brain':ch.equip==='Projectile'?'Brisk':'Brawn';
  const abilityName = ch.abilityName || ch.ability || '';
  const abilityDesc = ch.abilityDesc || '';

  // HP boxes — max 40, shown as rows of 10
  const hpBoxes = buildTrackBoxes(ch.maxHp, ch.hp, 'filled', 10, 40);

  // AP boxes
  const apBoxes = buildAPDots(ch.maxAp, ch.ap);

  // Marks
  const markCircles = Array.from({length: 5}, (_, i) =>
    `<div class="mark-circle ${i < (ch.marks || 0) ? 'filled' : ''}"></div>`
  ).join('');

  // Equipment list (items flagged as equipment)
  const equipItems = (ch.inventory || []).filter(it => it.equipment);
  const equipContent = equipItems.length
    ? equipItems.map(it => `<div style="font-family:'Crimson Pro',serif;font-size:0.75rem;padding:2px 0;border-bottom:1px solid var(--border-light);">${it.name}${it.desc ? ` <span style="font-style:italic;color:#666;">— ${it.desc}</span>` : ''}</div>`).join('') + ruledLines(Math.max(0, 4 - equipItems.length))
    : ruledLines(4);

  // Connections list (front page)
  const conItems = (ch.connections || []);
  const typeLabel = { person:'Person', place:'Place', faction:'Faction', other:'Other' };
  const conContent = conItems.length
    ? conItems.map(conn => `<div style="display:flex;align-items:baseline;gap:8px;border-bottom:1px solid var(--border-light);padding:3px 0;font-size:0.82rem;">
        <span style="font-family:'Cinzel',serif;font-size:0.6rem;color:var(--accent);min-width:42px;text-transform:uppercase;letter-spacing:0.04em;">${typeLabel[conn.type]||conn.type||''}</span>
        <span style="flex:1;">${conn.name}${conn.notes ? ` <span style="font-style:italic;color:#666;font-size:0.78rem;">— ${conn.notes}</span>` : ''}</span>
      </div>`).join('') + ruledLines(Math.max(0, 6 - conItems.length))
    : ruledLines(6);

  // ── FRONT PAGE ──────────────────────────────────────────────────────────
  const frontPage = `
  <div class="sheet">
    <!-- Header -->
    <div class="sheet-header">
      <div class="game-title">Dot Sheets &amp; Drumlines · Character Sheet</div>
      <div class="char-name-display">${ch.name}</div>
      <div class="char-meta">${ch.cls || 'Custom'} · Rolls ${cstat} in combat</div>
    </div>

    <!-- Top row: Primary stats | HP/AP | Equipment -->
    <div class="top-row">
      <div>
        <div class="sec-label">Primary Stats</div>
        <div class="stats-block">
          <div class="stat-cell">
            <div class="stat-name">Brawn</div>
            <div class="stat-value">${ch.brawn}</div>
            <div class="stat-sub">Physical</div>
          </div>
          <div class="stat-cell">
            <div class="stat-name">Brain</div>
            <div class="stat-value">${ch.brain}</div>
            <div class="stat-sub">Mental</div>
          </div>
          <div class="stat-cell">
            <div class="stat-name">Brisk</div>
            <div class="stat-value">${ch.brisk}</div>
            <div class="stat-sub">Speed</div>
          </div>
        </div>
        <div class="sec-label" style="margin-top:8px;">Conditions</div>
        <div style="border:1px solid var(--border);border-radius:4px;background:var(--parchment-dark);padding:2px 5px;">${ruledLines(3)}</div>
      </div>

      <div class="derived-block">
        <div>
          <div class="sec-label">Hit Points — ${ch.maxHp} max (cross off as you take damage)</div>
          <div class="derived-row">
            <div class="derived-label">HP</div>
            <div style="flex:1;background:var(--parchment-dark);padding:4px 6px;">${hpBoxes}</div>
          </div>
        </div>
        <div>
          <div class="sec-label">Action Points — ${ch.maxAp} per round</div>
          <div class="derived-row">
            <div class="derived-label gold-bg">AP</div>
            <div class="derived-boxes">${apBoxes}</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;font-family:'Crimson Pro',serif;font-size:0.78rem;color:#666;font-style:italic;">
          <span>Speed: <strong style="font-style:normal;color:var(--ink);">6</strong></span>
          <span>HP = 20 + (Brawn × 5)</span>
          <span>AP = 1 + Brain</span>
        </div>
      </div>

      <div class="equip-block">
        <div class="sec-label">Combat Stat</div>
        <div><span class="equip-type-badge">Rolls ${cstat}</span></div>
        <div class="sec-label" style="margin-top:8px;">Special Equipment</div>
        ${equipContent}
      </div>
    </div>

    <!-- Marks -->
    <div class="marks-row">
      <div class="marks-label">Marks</div>
      <div class="mark-circles">${markCircles}</div>
      <div class="marks-note">When HP = 0: take a Mark, choose −1 to a primary stat, reset HP to max</div>
    </div>

    <!-- AP Actions -->
    <div style="margin-bottom:12px;">
      <div class="ref-col-title" style="margin-bottom:4px;">⚡ AP Actions (1 AP each) — you are not limited to these</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px 10px;font-size:0.72rem;font-family:'Crimson Pro',serif;">

function ruledLines(count) {
  return Array.from({length: count}, () => `<div class="ruled-line"></div>`).join('');
}

function buildTrackBoxes(max, current, filledClass, perRow, cap) {
  const total = Math.min(max, cap);
  const rows = Math.ceil(total / perRow);
  let html = '<div style="display:flex;flex-direction:column;gap:3px;">';
  for (let r = 0; r < rows; r++) {
    html += '<div style="display:flex;gap:3px;">';
    for (let i = 0; i < perRow && (r * perRow + i) < total; i++) {
      const idx = r * perRow + i;
      const isFilled = idx < current;
      html += `<div style="width:20px;height:20px;border:1.5px solid var(--accent);border-radius:3px;background:${isFilled ? 'rgba(139,42,10,0.15)' : 'transparent'};flex-shrink:0;"></div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function buildAPDots(maxAp, currentAp) {
  return Array.from({length: maxAp}, (_, i) =>
    `<div class="derived-box ${i < currentAp ? 'gold-filled' : ''}"></div>`
  ).join('');
}

function printBlankSheet() {
  const container = document.getElementById('sheets-container');
  const saved = container.innerHTML;
  container.innerHTML = buildBlankSheet();
  window.addEventListener('afterprint', function restore() {
    container.innerHTML = saved;
  }, { once: true });
  window.print();
}
